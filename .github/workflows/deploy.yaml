name: CI - Build & Push Docker

on:
  pull_request:
    branches: [ "main" ]

  push:
    branches: [ "main" ]

# ⚠️ IMPORTANT : pas de permissions dynamiques ici
# on les gère par job

jobs:

  # =========================
  # 🟡 CI - Pull Request
  # =========================
  ci-pr:
    name: Build & Test (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        run: mvn clean verify -DskipTests

      # 🔍 Test Docker SANS push (optionnel mais recommandé)
      - name: Docker build (no push)
        run: docker build -t test-image .

  # =========================
  # 🟢 CI/CD - MAIN (release)
  # =========================
  ci-main:
    name: Build, Test & Push (MAIN)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        run: mvn clean verify -DskipTests

      # 🏷️ Extract short SHA for tagging
      - name: Extract short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 🔐 Login GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🐳 Build & Push Docker image
      - name: Build and push Docker
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}

          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker push $IMAGE_NAME:${{ github.sha }}

          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:${{ env.SHORT_SHA }}
          docker push $IMAGE_NAME:${{ env.SHORT_SHA }}