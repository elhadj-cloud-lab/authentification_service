name: CI - Build & Push Docker

on:
  pull_request:
    branches: [ "develop" ]

  push:
    branches: [ "develop", "main" ]
    tags: [ "v*" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  REGISTRY_IMAGE: ${{ github.repository }}

jobs:
  # =========================
  # 🔒 SECURITY SCAN
  # =========================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # =========================
  # 🟡 CI - Pull Request
  # =========================
  ci-pr:
    name: Build & Test (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [security-scan]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-report

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.REGISTRY_IMAGE }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#ff0000'
          SLACK_TITLE: '❌ PR Build Failed'
          SLACK_MESSAGE: '${{ github.repository }} - PR #${{ github.event.pull_request.number }}'

    # =========================
    #  CI - DEVELOP
    # =========================
    ci-develop:
      name: Build & Push (DEV)
      if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
      runs-on: ubuntu-latest
      needs: [ security-scan ]
      permissions:
        contents: read
        packages: write
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: 'maven'

        - name: Build and test
          run: mvn clean verify

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to GHCR
          uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Docker metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.REGISTRY_IMAGE }}
            tags: |
              type=sha,prefix=dev-
              type=raw,value=dev-latest

        - name: Build and push Docker
          uses: docker/build-push-action@v6
          with:
            context: .
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

    # =========================
    #  CI - MAIN (staging)
    # =========================
    ci-main:
      name: Build & Push (STAGING)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      needs: [ security-scan ]
      permissions:
        contents: read
        packages: write
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: 'maven'

        - name: Build and test
          run: mvn clean verify

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to GHCR
          uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Docker metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.REGISTRY_IMAGE }}
            tags: |
              type=sha,prefix=staging-
              type=raw,value=staging-latest
              type=raw,value=latest

        - name: Build and push Docker
          uses: docker/build-push-action@v6
          with:
            context: .
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

    # =========================
    # 🟣 CI - RELEASE
    # =========================
    release:
      name: Build & Push (PROD)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      runs-on: ubuntu-latest
      needs: [ security-scan ]
      permissions:
        contents: read
        packages: write
        attestations: write
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: 'maven'

        - name: Build and test
          run: mvn clean verify

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to GHCR
          uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Docker metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.REGISTRY_IMAGE }}
            tags: |
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=raw,value=stable

        - name: Build and push Docker
          uses: docker/build-push-action@v6
          with:
            context: .
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
            provenance: mode=max
            sbom: true

        - name: Generate artifact attestation
          uses: actions/attest-build-provenance@v1
          with:
            subject-name: ${{ env.REGISTRY_IMAGE }}
            subject-digest: ${{ steps.meta.outputs.digest }}


  gitops-update-dev:
    name: GitOps - Update Helm values (DEV)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
    runs-on: ubuntu-latest
    needs: [ci-develop]
    environment:
      name: development
    permissions:
      contents: write
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Update image tag
        run: |
          cd gitops-repo
          VALUES_FILE="apps/authentification-service/values-dev.yaml"
          SHORT_SHA="${GITHUB_SHA::7}"
          
          # Vérifier que le fichier existe
          if [ ! -f "$VALUES_FILE" ]; then
            echo "❌ Fichier non trouvé: $VALUES_FILE"
            echo "📁 Contenu du dépôt:"
            ls -la apps/authentification-service/ || echo "   Dossier non trouvé"
            exit 1
          fi
          
          sed -i "s/  tag: .*/  tag: dev-${{ env.SHORT_SHA }}/" "$VALUES_FILE"
          
          echo "✅ Tag mis à jour: dev-${{ env.SHORT_SHA }}"
#          grep "tag:" "$VALUES_FILE"
#          git status --porcelain

      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "deploy(dev): ${{ github.event.repository.name }} dev-${{ env.SHORT_SHA }}"
          git push

      - name: Notify success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#00ff00'
          SLACK_TITLE: '📦 DEV updated'
          SLACK_MESSAGE: '${{ github.event.repository.name }} - dev-${{ env.SHORT_SHA }}'

      - name: Notify failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#ff0000'
          SLACK_TITLE: '❌ DEV update failed'
          SLACK_MESSAGE: '${{ github.event.repository.name }} - ${{ github.ref_name }}'


  gitops-update-staging:
    name: GitOps - Update STAGING
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [ ci-main ]
    environment:
      name: staging
    permissions:
      contents: write
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Update image tag
        run: |
          cd gitops-repo
          VALUES_FILE="apps/${{ github.event.repository.name }}/values-staging.yaml"
          sed -i "s/  tag: .*/  tag: staging-${{ env.SHORT_SHA }}/" "$VALUES_FILE"
          echo "✅ Tag mis à jour: staging-${{ env.SHORT_SHA }}"

      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "deploy(staging): ${{ github.event.repository.name }} staging-${{ env.SHORT_SHA }}"
          git push

      - name: Notify success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#00ff00'
          SLACK_TITLE: '📦 STAGING updated'
          SLACK_MESSAGE: '${{ github.event.repository.name }} - staging-${{ env.SHORT_SHA }}'

      - name: Notify failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#ff0000'
          SLACK_TITLE: '❌ STAGING update failed'
          SLACK_MESSAGE: '${{ github.event.repository.name }} - ${{ github.ref_name }}'

  gitops-update-prod:
    name: GitOps - Update Helm values (PROD)
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: [release]
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Set tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Update image tag
        run: |
          cd gitops-repo
          VALUES_FILE="apps/${{ github.event.repository.name }}/values-prod.yaml"
          
          sed -i "s/  tag: .*/  tag: ${{ env.TAG_NAME }}/" "$VALUES_FILE"
          
          echo "✅ Tag mis à jour: ${{ env.TAG_NAME }}"

      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "release(prod): ${{ github.event.repository.name }} ${{ env.TAG_NAME }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true

      - name: Notify success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#00ff00'
          SLACK_TITLE: '🚀 PROD deployed'
          SLACK_MESSAGE: '${{ github.event.repository.name }} - ${{ env.TAG_NAME }}'

      - name: Notify failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#ff0000'
          SLACK_TITLE: '💥 PROD deployment failed'
          SLACK_MESSAGE: '${{ github.event.repository.name }} - ${{ github.ref_name }}'