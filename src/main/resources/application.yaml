spring:
  application:
    name: authentification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/db_users
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  main:
    allow-circular-references: true
server:
  port: 8082
  servlet:
    context-path: /users
